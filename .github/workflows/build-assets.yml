name: Build theme assets

on:
  push:
    branches:
      - main
      - "claude/**"
    paths:
      - "astral/assets/**"
      - "astral/package.json"
      - "astral/yarn.lock"
      - "astral/vite.config.js"
      - "astral/postcss.config.js"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: astral/yarn.lock

      - name: Install dependencies
        working-directory: astral
        run: yarn install --frozen-lockfile

      - name: Build assets
        working-directory: astral
        run: yarn build

      - name: Commit built assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add astral/static
          if git diff --staged --quiet; then
            echo "No built asset changes to commit."
          else
            git commit -m "chore(assets): rebuild theme static assets [skip ci]"
            git push
          fi
